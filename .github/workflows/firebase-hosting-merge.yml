name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
permissions:
  checks: write
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install && npm run build
        working-directory: ./frontend
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROJECT_DBCE43FC_C6AD_4B_82BCD }}'
          projectId: project-dbce43fc-c6ad-4b-82bcd
          channelId: live
          entryPoint: ./frontend